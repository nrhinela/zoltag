# Cloud Build configuration for GCP deployment

steps:
  # Pull previous images for layer cache (continue if not found)
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker pull gcr.io/$PROJECT_ID/zoltag:latest || echo "No light-image cache found"
        docker pull gcr.io/$PROJECT_ID/zoltag-ml:latest || echo "No ml-image cache found"
    id: 'pull-cache'
  
  # Use Node 20 for Vite 7.x compatibility - clean install + build
  - name: 'node:20'
    entrypoint: 'bash'
    args: ['-c', 'export VITE_SUPABASE_URL=$$SUPABASE_URL && export VITE_SUPABASE_ANON_KEY=$$SUPABASE_ANON_KEY && npm ci --include=dev && npm run build']
    secretEnv:
      - 'SUPABASE_URL'
      - 'SUPABASE_ANON_KEY'
  
  # Build light runtime image (API + sentinel + non-ML workers)
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '--target', 'runtime-light',
      '--build-arg', 'PRELOAD_SIGLIP=0',
      '--build-arg', 'BUILDKIT_INLINE_CACHE=1',
      '--cache-from', 'gcr.io/$PROJECT_ID/zoltag:latest',
      '-t', 'gcr.io/$PROJECT_ID/zoltag:$_COMMIT_SHA',
      '-t', 'gcr.io/$PROJECT_ID/zoltag:latest',
      '.'
    ]
    env:
      - 'DOCKER_BUILDKIT=1'

  # Build ML worker image (SigLIP baked in)
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '--target', 'runtime-ml',
      '--build-arg', 'PRELOAD_SIGLIP=1',
      '--build-arg', 'BUILDKIT_INLINE_CACHE=1',
      '--cache-from', 'gcr.io/$PROJECT_ID/zoltag-ml:latest',
      '-t', 'gcr.io/$PROJECT_ID/zoltag-ml:$_COMMIT_SHA',
      '-t', 'gcr.io/$PROJECT_ID/zoltag-ml:latest',
      '.'
    ]
    env:
      - 'DOCKER_BUILDKIT=1'

  # Push light image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/zoltag:$_COMMIT_SHA']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/zoltag:latest']

  # Push ML image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/zoltag-ml:$_COMMIT_SHA']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/zoltag-ml:latest']

  # Deploy API service with light image
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'zoltag-api'
      - '--image'
      - 'gcr.io/$PROJECT_ID/zoltag:$_COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory=2Gi'
      - '--cpu=1'
      - '--timeout=900'
      - '--max-instances=1'
      - '--min-instances=0'
      - '--set-env-vars'
      - 'GCP_PROJECT_ID=photocat-483622,ENVIRONMENT=prod,APP_URL=https://zoltag.com,TAGGING_MODEL=siglip,STORAGE_BUCKET_NAME=photocat-483622-prod-shared,THUMBNAIL_BUCKET_NAME=photocat-483622-prod-shared,PERSON_REFERENCE_BUCKET_NAME=photocat-483622-prod-person-references,THUMBNAIL_CDN_BASE_URL=,THUMBNAIL_SIGNED_URLS=true,GEMINI_API_MODE=vertex,GEMINI_MODEL=gemini-2.5-flash-lite,DB_POOL_SIZE=8,DB_MAX_OVERFLOW=4,DB_POOL_TIMEOUT=15,DB_POOL_RECYCLE=300,DB_CONNECT_TIMEOUT=10,DB_POOL_USE_LIFO=true,DB_KEEPALIVES=1,DB_KEEPALIVES_IDLE=30,DB_KEEPALIVES_INTERVAL=10,DB_KEEPALIVES_COUNT=5,UPLOAD_GENERATE_EMBEDDINGS=false'
      - '--set-secrets'
      - 'DROPBOX_APP_KEY=dropbox-app-key:latest,DROPBOX_APP_SECRET=dropbox-app-secret:latest,SUPABASE_SERVICE_ROLE_KEY=supabase-service-role-key:latest,SUPABASE_URL=supabase-url:latest,SUPABASE_ANON_KEY=supabase-anon-key:latest,DATABASE_URL=supabase-db-url:latest,GEMINI_API_KEY=gemini-api-key:latest,EMAIL_RESEND_API_KEY=email-resend-api-key:latest,OAUTH_STATE_SECRET=oauth-state-secret:latest,ZOLTAG_GDRIVE_CONNECTOR_CLIENT_ID=zoltag-gdrive-connector-client-id:latest,ZOLTAG_GDRIVE_CONNECTOR_SECRET=zoltag-gdrive-connector-secret:latest'


images:
  - 'gcr.io/$PROJECT_ID/zoltag:$_COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/zoltag-ml:$_COMMIT_SHA'

options:
  machineType: 'E2_MEDIUM'

timeout: '2400s'  # 40 minutes

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/supabase-url/versions/latest
      env: 'SUPABASE_URL'
    - versionName: projects/$PROJECT_ID/secrets/supabase-anon-key/versions/latest
      env: 'SUPABASE_ANON_KEY'
