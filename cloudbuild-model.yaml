# Cloud Build configuration for refreshing the baked ML worker image.

steps:
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args: ['-c', 'docker pull gcr.io/$PROJECT_ID/zoltag-ml:latest || echo "No ML image cache found"']
    id: 'pull-ml-cache'

  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '--target', 'runtime-ml',
      '--build-arg', 'PRELOAD_SIGLIP=1',
      '--build-arg', 'BUILDKIT_INLINE_CACHE=1',
      '--cache-from', 'gcr.io/$PROJECT_ID/zoltag-ml:latest',
      '-t', 'gcr.io/$PROJECT_ID/zoltag-ml:latest',
      '.'
    ]
    env:
      - 'DOCKER_BUILDKIT=1'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/zoltag-ml:latest']

images:
  - 'gcr.io/$PROJECT_ID/zoltag-ml:latest'

options:
  machineType: 'E2_MEDIUM'

timeout: '2400s'
